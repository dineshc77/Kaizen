<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Kaizen · User · Reviewer · Approver — Grasim Fibre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Sora:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --ink:#15171C;--ink-2:#2A2E37;--surface:#FFFFFF;--surface-2:#FAF9F5;--bg:#EFEDE6;
  --line:rgba(21,23,28,.10);--line-2:rgba(21,23,28,.16);--muted:#6E6D66;--muted-2:#9B9A92;
  --ember:#EF5026;--ember-d:#C23C18;--ember-soft:#FCEAE3;
  --emerald:#159468;--emerald-soft:#E2F2EB;--amber:#D98A12;--amber-soft:#FBEFD7;
  --blue:#2A6FE0;--blue-soft:#E5EEFC;--red:#D8423A;--red-soft:#FBE6E4;--violet:#5b4ad1;--violet-soft:#ECEAFE;--teal:#0f8a8a;
  --d-bg:#0E1116;--d-panel:#161B22;--d-panel-2:#1C232C;--d-line:rgba(255,255,255,.09);--d-text:#E9EAE4;--d-muted:#9098A2;
  --r:12px;--r-lg:16px;
  --sh:0 1px 2px rgba(21,23,28,.05),0 6px 22px rgba(21,23,28,.06);
  --sh-lg:0 2px 6px rgba(21,23,28,.06),0 24px 60px rgba(21,23,28,.13);
  --sans:"Hanken Grotesk",sans-serif;--disp:"Sora",sans-serif;--mono:"JetBrains Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.mono{font-family:var(--mono);font-feature-settings:"tnum"}

/* persona switcher */
.pbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:16px;padding:12px 22px;background:rgba(244,242,236,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:-.01em}
.brand .mk{width:30px;height:30px;border-radius:9px;background:var(--ink);position:relative;display:grid;place-items:center;color:#fff;font-size:15px;overflow:hidden}
.brand .mk::after{content:"";position:absolute;inset:0;background:conic-gradient(from 210deg at 50% 120%,var(--ember),transparent 40%)}
.brand .mk span{position:relative;z-index:1}
.brand small{display:block;font-family:var(--sans);font-weight:500;font-size:10px;color:var(--muted);margin-top:-2px}
.pbar .sp{flex:1}
.pswitch{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px;box-shadow:var(--sh)}
.pswitch button{font-size:13px;font-weight:600;padding:8px 16px;border-radius:999px;color:var(--muted);display:flex;align-items:center;gap:7px}
.pswitch button.on{background:var(--ink);color:#fff}
.pswitch button .ti{font-size:16px}
.pbar .client{font-size:12px;color:var(--muted);text-align:right;line-height:1.3}
.pbar .client b{color:var(--ink);font-weight:600}

/* console (reviewer/approver) */
.app{display:grid;grid-template-columns:236px 1fr;height:100vh;overflow:hidden}
.side{color:var(--d-muted);padding:18px 14px;display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.side .lg{display:flex;align-items:center;gap:10px;color:#fff;font-family:var(--disp);font-weight:700;font-size:15px;padding:4px 8px}
.side .lg .mark{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:15px}
.side .lg small{display:block;font-family:var(--sans);font-weight:500;font-size:10px;color:var(--d-muted);margin-top:-1px}
.side .sec{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#5d646e;font-weight:700;margin:18px 10px 7px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;font-size:13px;font-weight:500;color:var(--d-muted);position:relative}
.nav a .ti{font-size:18px}
.nav a .cnt{margin-left:auto;font-family:var(--mono);font-size:10.5px;font-weight:600;background:var(--d-panel-2);padding:2px 7px;border-radius:99px}
.nav a.on{background:var(--d-panel-2);color:#fff}
.nav a.on::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--ember)}
.nav a:hover{color:#fff}
.side .who{margin-top:auto;display:flex;align-items:center;gap:10px;padding:11px 8px 2px;border-top:1px solid var(--d-line);font-size:12.5px}
.side .who b{color:#fff;font-weight:600;display:block}
.main{display:flex;flex-direction:column;min-width:0;background:var(--bg);height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:15px 26px;background:var(--surface);border-bottom:1px solid var(--line);flex:none}
.topbar h1{font-family:var(--disp);font-size:22px;font-weight:600;letter-spacing:-.025em;color:var(--ink)}
.topbar .crumb{font-size:11px;color:var(--muted);font-weight:600}
.view{padding:24px 26px 60px;overflow-y:auto;flex:1}

/* bits */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:999px;line-height:1}
.pill .ti{font-size:13px}
.pill.ok{background:var(--emerald-soft);color:var(--emerald)}.pill.work{background:var(--blue-soft);color:var(--blue)}
.pill.warn{background:var(--amber-soft);color:var(--amber)}.pill.bad{background:var(--red-soft);color:var(--red)}
.pill.muted{background:rgba(21,23,28,.06);color:var(--muted)}.pill.ember{background:var(--ember-soft);color:var(--ember-d)}
.pill.violet{background:var(--violet-soft);color:var(--violet)}
.tag{font-size:10px;font-weight:600;padding:3px 7px;border-radius:6px;background:rgba(21,23,28,.05);color:var(--muted)}
.tier{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px}
.tier.A{background:var(--emerald-soft);color:var(--emerald)}.tier.B{background:var(--blue-soft);color:var(--blue)}.tier.C{background:var(--violet-soft);color:var(--violet)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:13px;padding:10px 16px;border-radius:10px;background:var(--surface);border:1px solid var(--line-2);transition:.15s}
.btn:hover{border-color:var(--ink-2)}
.btn.prim{background:var(--ember);color:#fff;border-color:var(--ember)}.btn.prim:hover{background:var(--ember-d)}
.btn.ok{background:var(--emerald);color:#fff;border-color:var(--emerald)}
.btn.sm{padding:7px 12px;font-size:12px}.btn.block{width:100%}
.avatar{border-radius:50%;flex:none;display:grid;place-items:center;font-weight:600;color:#fff;font-size:11px}
.bar{height:7px;border-radius:99px;background:rgba(21,23,28,.08);overflow:hidden}.bar>i{display:block;height:100%;border-radius:99px;background:var(--ember)}
hr.sep{border:none;border-top:1px solid var(--line);margin:14px 0}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh)}
.cardp{padding:18px}
.card h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.card .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.kpis{display:grid;gap:13px;margin-bottom:18px}
.kpis.k4{grid-template-columns:repeat(4,1fr)}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:15px;box-shadow:var(--sh)}
.kpi .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:16px;margin-bottom:10px}
.kpi .lab{font-size:11px;color:var(--muted);font-weight:600}
.kpi .val{font-family:var(--disp);font-size:25px;font-weight:600;letter-spacing:-.02em;margin-top:2px}
.kpi .val small{font-size:13px;color:var(--muted)}
.kpi .delta{font-size:11px;font-weight:600;color:var(--emerald);margin-top:3px;display:flex;align-items:center;gap:3px}
.g{display:grid;gap:16px}.g.c2{grid-template-columns:1fr 1fr}.g.wl{grid-template-columns:1.4fr 1fr}.g.wr{grid-template-columns:1fr 1.4fr}
.chartbox{position:relative;width:100%;height:230px}.chartbox.sm{height:190px}
.qitem{display:flex;align-items:center;gap:11px;padding:11px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;cursor:pointer;transition:.12s}
.qitem:hover{border-color:var(--line-2);background:var(--surface-2)}
.qitem .meta{flex:1;min-width:0}.qitem .meta b{font-size:13px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.qitem .meta span{font-size:11px;color:var(--muted)}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr{cursor:pointer}.tbl tbody tr:hover{background:var(--surface-2)}.tbl .tt{font-weight:600}
.muted{color:var(--muted)}
.field{margin-bottom:13px}.field label{font-size:12px;font-weight:600;color:var(--ink-2);display:block;margin-bottom:6px}
.input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--ink);font-family:inherit}
.input.area{min-height:64px;resize:none}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chips button{font-size:12px;font-weight:600;padding:7px 12px;border-radius:99px;border:1px solid var(--line-2);color:var(--ink-2);background:var(--surface)}
.chips button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
input[type=range]{width:100%;accent-color:var(--ember)}
.crit{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.crit .lab{font-size:12.5px;font-weight:600;width:150px}
.crit .val{font-family:var(--mono);font-weight:700;font-size:13px;width:54px;text-align:right}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:var(--sh-lg);opacity:0;transition:.25s;z-index:99;display:flex;align-items:center;gap:9px;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== employee phone ===== */
.stage{display:flex;justify-content:center;padding:26px 18px 50px}
.phone{width:392px;background:#0b0c0e;border-radius:46px;padding:13px;box-shadow:var(--sh-lg);position:relative}
.phone::before{content:"";position:absolute;top:24px;left:50%;transform:translateX(-50%);width:120px;height:30px;background:#0b0c0e;border-radius:0 0 18px 18px;z-index:6}
.phscreen{background:var(--surface-2);border-radius:34px;overflow:hidden;height:812px;position:relative;display:flex;flex-direction:column}
.statusbar{display:flex;justify-content:space-between;align-items:center;padding:14px 26px 8px;font-size:12.5px;font-weight:600;flex:none}
.statusbar .ic{display:flex;gap:5px;align-items:center}
.phbody{flex:1;overflow:auto;position:relative}
.phbody::-webkit-scrollbar{width:0}
.appbar{display:flex;align-items:center;gap:12px;padding:8px 18px 12px}
.appbar .logo{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.appbar .logo .mk{width:24px;height:24px;border-radius:7px;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:12px}
.seg{display:flex;gap:4px;margin:0 18px 14px;background:rgba(21,23,28,.05);padding:4px;border-radius:11px}
.seg button{flex:1;font-size:13px;font-weight:600;color:var(--muted);padding:8px;border-radius:8px}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--sh)}
.tabbar{display:flex;justify-content:space-around;align-items:center;padding:9px 8px 22px;border-top:1px solid var(--line);background:rgba(255,255,255,.92);backdrop-filter:blur(8px);flex:none}
.tabbar a{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;font-weight:600;color:var(--muted-2)}
.tabbar a .ti{font-size:21px}.tabbar a.on{color:var(--ember)}
.fab{width:50px;height:50px;border-radius:16px;background:var(--ember);color:#fff;display:grid;place-items:center;font-size:24px;box-shadow:0 8px 20px rgba(239,80,38,.4);margin-top:-26px}
.feedcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);margin:0 14px 14px;overflow:hidden;box-shadow:var(--sh)}
.fc-top{display:flex;align-items:center;gap:10px;padding:13px 14px 10px}
.fc-top .meta{flex:1;line-height:1.25}.fc-top .meta b{font-size:13.5px;font-weight:600}.fc-top .meta span{font-size:11px;color:var(--muted)}
.fc-body{padding:0 14px 12px}
.fc-title{font-size:15px;font-weight:600;letter-spacing:-.01em;margin-bottom:7px;font-family:var(--disp)}
.fc-ba{display:flex;gap:8px;margin:11px 0}
.fc-ba div{flex:1;border-radius:11px;height:88px;display:flex;align-items:flex-end;padding:8px;font-size:10px;font-weight:600;color:#fff;overflow:hidden}
.fc-ba .b{background:linear-gradient(150deg,#8a8a82,#5d5d56)}.fc-ba .a{background:linear-gradient(150deg,#1fae7d,#0f7d54)}
.fc-stat{display:flex;align-items:center;gap:7px;background:var(--emerald-soft);color:var(--emerald);border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:600;margin-top:4px}
.fc-act{display:flex;align-items:center;gap:18px;padding:11px 14px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted);font-weight:500}
.fc-act span{display:flex;align-items:center;gap:6px}.fc-act .ti{font-size:17px}
.mcard{display:flex;gap:12px;padding:12px;border:1px solid var(--line);border-radius:14px;background:var(--surface);margin:0 14px 12px;box-shadow:var(--sh);cursor:pointer}
.mcard .ico{width:42px;height:42px;border-radius:11px;flex:none;display:grid;place-items:center;color:#fff;font-size:19px}
.timeline{display:flex;align-items:center;margin:6px 0}
.timeline .st{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;position:relative}
.timeline .st .d{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:12px;background:rgba(21,23,28,.08);color:var(--muted);z-index:1}
.timeline .st.done .d{background:var(--emerald);color:#fff}
.timeline .st.now .d{background:var(--ember);color:#fff;box-shadow:0 0 0 5px var(--ember-soft)}
.timeline .st .lab{font-size:9.5px;font-weight:600;color:var(--muted)}
.timeline .st.now .lab,.timeline .st.done .lab{color:var(--ink)}
.timeline .st::before{content:"";position:absolute;top:12px;left:-50%;width:100%;height:2px;background:rgba(21,23,28,.1)}
.timeline .st:first-child::before{display:none}
.timeline .st.done::before,.timeline .st.now::before{background:var(--emerald)}
.stepper{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.stepper .s{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--muted)}
.stepper .s .n{width:22px;height:22px;border-radius:50%;background:rgba(21,23,28,.08);display:grid;place-items:center;font-size:11px}
.stepper .s.on .n{background:var(--ember);color:#fff}.stepper .s.on{color:var(--ink)}
.stepper .ln{flex:1;height:2px;background:rgba(21,23,28,.1);border-radius:9px}
.pad{padding:0 18px}
.web{max-width:1200px;margin:0 auto;padding:22px 26px 64px}
.webnav{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:10px 16px;box-shadow:var(--sh);margin-bottom:20px;position:sticky;top:73px;z-index:20}
.webnav .hub{font-family:var(--disp);font-weight:700;font-size:15px;margin-right:8px}
.webnav a{font-size:13.5px;font-weight:600;color:var(--muted);padding:8px 13px;border-radius:9px;cursor:pointer}
.webnav a.on,.webnav a:hover{background:var(--surface-2);color:var(--ink)}
.wsrch{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--muted-2);width:230px;cursor:text;transition:.15s}
.wsrch:hover{border-color:var(--line-2)}
.wsrch .ti{font-size:16px;color:var(--muted)}
.web-home{display:grid;grid-template-columns:250px 1fr 300px;gap:20px;align-items:start}
.web-2{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.web-grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.web-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.web .feedcard{margin:0 0 16px}
.railcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px;box-shadow:var(--sh)}
.sticky{position:sticky;top:0}
.endo{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);padding:5px 11px;border-radius:999px;transition:.15s;cursor:pointer}
.endo .ti{font-size:15px}
.endo:hover{border-color:var(--ember);color:var(--ember-d)}
.endo.on{background:var(--ember-soft);border-color:rgba(239,80,38,.45);color:var(--ember-d)}
.dupbanner{display:none;align-items:flex-start;gap:9px;background:var(--amber-soft);border:1px solid rgba(217,138,18,.35);color:var(--amber);border-radius:11px;padding:11px 13px;font-size:12.5px;margin:-4px 0 14px;line-height:1.45}
.dupbanner .ti{font-size:17px;flex:none;margin-top:1px}.dupbanner b{color:var(--ink)}
.modal-bg{position:fixed;inset:0;background:rgba(21,23,28,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:90;padding:20px}
.modal{background:var(--surface);border-radius:20px;max-width:472px;width:100%;box-shadow:var(--sh-lg);overflow:hidden;animation:pop .25s}
@keyframes pop{from{transform:scale(.95);opacity:0}to{transform:none;opacity:1}}
.modal .top2{padding:24px 24px 0;text-align:center}
.modal .bic{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;margin:0 auto 14px;font-size:27px}
.modal h3{font-family:var(--disp);font-size:19px;font-weight:600;letter-spacing:-.01em}
.modal p.m{font-size:13.5px;color:var(--muted);margin-top:8px;line-height:1.55}
.modal .body2{padding:18px 24px 24px}
.spark{display:flex;align-items:center;gap:9px;background:var(--ember-soft);color:var(--ember-d);border-radius:11px;padding:11px 13px;font-size:12.5px;font-weight:600;margin:14px 0}
.matchcard{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--surface-2)}
.web-feed{display:grid;grid-template-columns:1fr 1fr 232px;gap:20px;align-items:start}
.feedcol{min-width:0}
.feedrail{position:sticky;top:0;align-self:start}
.feedbar{display:flex;align-items:center;gap:16px;padding:0 26px;background:var(--surface);border-bottom:1px solid var(--line);flex:none}
.seg-tabs{display:flex}
.seg-tabs button{font-size:13px;font-weight:600;color:var(--muted);padding:15px 2px;margin-right:22px;border-bottom:2px solid transparent;transition:.12s;cursor:pointer;background:none}
.seg-tabs button:hover{color:var(--ink)}
.seg-tabs button.on{color:var(--ink);border-bottom-color:var(--ember)}
.feedbar .fh-count{margin-left:auto}
.ic-photos{display:flex;gap:8px;margin:0 0 13px}
.ic-photo{flex:1;height:138px;border-radius:13px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:9px}
.ic-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 45%,rgba(0,0,0,.3))}
.ic-pcap{position:relative;z-index:1;display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:rgba(255,255,255,.95);background:rgba(0,0,0,.34);padding:3px 9px;border-radius:20px}
.ic-pcap .ti{font-size:13px}
.att-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.att-tiles .att-tile{border:1.5px dashed var(--line-2);border-radius:13px;padding:15px 12px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.14s;background:var(--surface)}

   Renders the built-in demo data immediately, then replaces it with real ideas from

function mapIdea(r){const sc=_sc(r.sub);ENDO[r.id]={n:r.endo||0,on:false};
 return {id:r.id,title:r.title,dept:r.dept,cat:r.cat,tier:r.tier,stage:r.stage,est:r.est,act:r.act,score:r.score,sla:r.sla||'-',month:r.month||'-',sub:r.sub,plant:r.plant,init:sc[0],clr:sc[1],cm:r.cm||0};}
async function loadLive(){
 try{
  const j=async u=>{const r=await fetch(API_BASE+u);if(!r.ok)throw new Error(u+' '+r.status);return r.json();};
  const boot=await j('/api/portal/bootstrap?plant=Nagda');
  PINFO=boot.personas; const emp=PINFO.employee;
  ME.user=emp.name;
  if(PINFO.evaluator)ME.reviewer=PINFO.evaluator.name;
  if(PINFO.approver)ME.approver=PINFO.approver.name;
  const enc=encodeURIComponent;
  const [feed,mine,stories,evq,apq,lb]=await Promise.all([
   j('/api/feed?plant='+enc(emp.plant)+'&department='+enc(emp.dept)),
   j('/api/my-ideas?user_id='+emp.id),
   j('/api/stories?plant='+enc(emp.plant)),
   j('/api/evaluation-queue?plant='+enc(emp.plant)),
   j('/api/approval-queue?plant='+enc(emp.plant)),
   j('/api/leaderboard?plant='+enc(emp.plant))]);
  LB=lb.leaders||[];
  let dupIdeas=[];
  try{const dk=await j('/api/dup-keywords');dupIdeas=(dk.ideas||[]).map(r=>{const o=mapIdea(r);o.kw=r.kw;return o;});}catch(e){}
  const seen=new Set(dupIdeas.map(d=>d.id)),merged=[];
  [...mine.ideas,...feed.ideas,...stories.ideas,...evq.ideas,...apq.ideas].forEach(r=>{if(seen.has(r.id))return;seen.add(r.id);merged.push(mapIdea(r));});
  IDEAS.length=0;IDEAS.push(...merged,...dupIdeas);
  clearCharts();render();
  console.log('Kaizen portal: live data loaded —',merged.length,'ideas from kaizen.db · user',ME.user);
 }catch(e){console.warn('Kaizen portal: backend unreachable — showing built-in demo data.',e);clearCharts();render();}
}

 /* ---------- online STT (Sarvam): record with VAD, post to /api/stt ---------- */
 async function initMic(){micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});audioCtx=new (window.AudioContext||window.webkitAudioContext)();const src=audioCtx.createMediaStreamSource(micStream);analyser=audioCtx.createAnalyser();analyser.fftSize=1024;src.connect(analyser);vadData=new Uint8Array(analyser.fftSize);}
 function micLevel(){analyser.getByteTimeDomainData(vadData);let s=0;for(let i=0;i<vadData.length;i++){const v=(vadData[i]-128)/128;s+=v*v;}return Math.sqrt(s/vadData.length);}
 function pickMime(){const o=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];for(const m of o){if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m))return m;}return '';}
 function recordTurn(){
  return new Promise(async resolve=>{
   if(!micStream){try{await initMic();}catch(e){resolve('__micerr__');return;}}
   let chunks=[],hasSpoken=false,lastVoice=performance.now(),start=performance.now(),stopped=false;
   const mime=pickMime(); let rec;
   try{rec=mime?new MediaRecorder(micStream,{mimeType:mime}):new MediaRecorder(micStream);}catch(e){try{rec=new MediaRecorder(micStream);}catch(e2){resolve('__micerr__');return;}}
   curRec=rec;
   rec.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data);};
   rec.onstop=async ()=>{
    if(paused||ending){resolve('');return;}
    const blob=new Blob(chunks,{type:(rec.mimeType||'audio/webm')});
    if(!hasSpoken||blob.size<1500){resolve('');return;}
    setOrb('think'); setStatus(LANGS[lang].thinking,'think');
    try{const fd=new FormData();fd.append('audio',blob,'audio.webm');fd.append('lang',lang);
     const r=await fetch(API+'/api/stt',{method:'POST',body:fd});const d=await r.json();
     if(d.error)throw new Error(d.error);
     resolve((d.transcript||'').trim());
    }catch(e){showErr('Hearing error: '+(e.message||e));resolve('');}
   };
   try{rec.start();}catch(e){resolve('__micerr__');return;}
   setOrb('live'); setStatus(LANGS[lang].yourTurn,'live'); setYou('');
   const loop=()=>{
    if(stopped||paused||ending){return;}
    const lvl=micLevel(),now=performance.now();
    if(lvl>VAD_THRESHOLD){hasSpoken=true;lastVoice=now;}
    const elapsed=now-start,silence=now-lastVoice;
    if((hasSpoken&&silence>SILENCE_MS&&elapsed>MIN_SPEECH_MS)||elapsed>MAX_REC_MS){stopped=true;try{rec.stop();}catch(e){}return;}
    vadRAF=requestAnimationFrame(loop);
   };
   vadRAF=requestAnimationFrame(loop);
  });

 function listenOnce(){
  return new Promise((resolve,reject)=>{
   const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
   if(!SR){reject(new Error('nospeech'));return;}
   const r=new SR();r.lang=LANGS[lang].bcp;r.interimResults=true;r.maxAlternatives=1;r.continuous=false;
   let finalTxt='';
   r.onresult=e=>{let t='';for(let i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;finalTxt=t;setYou(t);};
   r.onerror=ev=>reject(new Error(ev.error||'mic'));
   r.onend=()=>resolve(finalTxt.trim());
   curRecog=r;try{r.start();}catch(e){reject(new Error('mic'));}
  });
 }

 /* ---------- conversation loop ---------- */
 async function turn(){
  if(ending||paused)return;
  showType(); hideErr();
  let text='';
  if(online){
   text=await recordTurn();
   if(text==='__micerr__'){ online=false; showErr(LANGS[lang].micErr); return turn(); } // mic failed -> fall to web speech
  }else{
   if(!hasSpeech()){ setOrb('idle'); setStatus('Type your idea below'); return; }
   setOrb('live'); setStatus(LANGS[lang].yourTurn,'live'); setYou('');
   try{ text=await listenOnce(); }
   catch(err){ const e=(err&&err.message)||''; if(e==='not-allowed'||e==='service-not-allowed'){ setOrb('idle'); setStatus('Type your idea below'); showErr(LANGS[lang].micErr); return; } text=''; }
  }
  if(!text||text.length<2){ emptyTries++; if(emptyTries>=2){ setOrb('idle'); setStatus('Tap “Speak again” or type'); return; } return turn(); }
  emptyTries=0; await handleUser(text);
 }

    const r=await fetch(API+'/api/converse',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({lang,name:EMP_NAME(),messages:history})});
    const d=await r.json(); if(d.error)throw new Error(d.error);
    data=d; history.push({role:'assistant',content:JSON.stringify(d)});
   }catch(e){ showErr('AI error: '+(e.message||e)); online=false; } // drop to local for the rest
  }
  if(!data){ // offline / fallback path
   if(askedDept) clarifyText=(clarifyText?clarifyText+' ':'')+text; else ideaText=(ideaText?ideaText+' ':'')+text;
   await new Promise(r=>setTimeout(r,300));
   data=classifyLocal(ideaText,(ideaText+' '+clarifyText).trim());
  }
  setYou('');
  if(data.action==='ask'){ askedDept=true; await say(data.speech); turn(); }
  else { await finish(data); }

 function cleanText(t){let s=(t||'').replace(/\s+/g,' ').trim();s=s.replace(/\bi\b/g,'I').replace(/\bi'/g,"I'");s=s.replace(/\s+([,.;:!?])/g,'$1');return s;}

 function stripTrailing(t){return t.replace(TRAIL,'').replace(/[\s,;:.]+$/,'').trim();}
 function detectDept(t){const x=t.toLowerCase();for(const [d,ks] of DEPT_KW){if(ks.some(k=>x.includes(k)))return d;}return null;}
 function detectTier(t){const x=t.toLowerCase();if(/(new machine|new equipment|automation|automate|conveyor|robot|install a|capital|interlock system|plc|scada|crore|करोड़|lakhs|machine modification|big project)/.test(x))return {tier:3,reason:'Needs new equipment / capital spend',cost:'Above ₹1 lakh'};if(/(guard|sensor|light|lighting|mat|poster|sign|signage|board|fixture|platform|step|tool|tooling|paint|marking|cover|trolley|rack|small|buy a|purchase a|fan|cushion|railing)/.test(x))return {tier:2,reason:'Low-cost item or fixture (≤ ₹1 lakh)',cost:'Up to ₹1 lakh'};return {tier:1,reason:'No purchase cost — in-house change',cost:'No cost · in-house'};}
 function makeTitle(idea){
  const clean=stripLeadins(cleanText(idea));
  const clauses=clean.split(/\s*(?:,|;|\.|\bas\b|\bbecause\b|\bsince\b|\bso that\b|\bso\b|\bbut\b|\band\b|\bwhich\b|\bwhen\b)\s*/i).map(c=>c.trim()).filter(c=>c.split(' ').length>=2);
  let best=clauses[0]||clean,bestScore=-1;
  clauses.forEach(c=>{const lc=c.toLowerCase();let sc=PROB.reduce((a,k)=>a+(lc.includes(k)?2:0),0);sc+=Math.min(c.split(' ').length,8)*0.3;if(sc>bestScore){bestScore=sc;best=c;}});
  let t=best.replace(PRON_LEAD,'').trim();
  const TAILW=/^(to|the|a|an|and|or|of|for|on|in|with|that|is|are|will|we|i|so|but|as|at|by|from|our)$/i;
  let w=t.split(' ');while(w.length&&FILLER.test(w[0]))w.shift();if(w.length>9)w=w.slice(0,9);
  while(w.length>3&&TAILW.test(w[w.length-1]))w.pop();
  t=stripTrailing(w.join(' '));
  if(!t||t.split(' ').length<2)t=stripTrailing(stripLeadins(cleanText(idea)).split(' ').slice(0,8).join(' '));
  return t.charAt(0).toUpperCase()+t.slice(1);
 }
 function classifyLocal(idea,all){
  const dept=detectDept(all);
  if(!dept&&!askedDept)return {action:'ask',speech:LANGS[lang].askDept};
  const tier=detectTier(all);
  return {action:'final',speech:LANGS[lang].thanks(EMP_NAME()),title:makeTitle(idea),description:sentence(stripTrailing(cleanText(idea))),department:dept||'Process/Digital',tier:tier.tier,tier_reason:tier.reason,cost_estimate:tier.cost};
 }

 /* ---------- pre-fill the Submit form + land on Review ---------- */
 function setVal(id,v){const e=$(id);if(e)e.value=v;}
 function applyToForm(data){
  const dept=mapDept(data.department);
  setVal('subTitle',data.title);
  const ta=$('subDesc'); if(ta)ta.value=data.description;
  const dv=$('deptVal'); if(dv)dv.textContent=dept;
  const tier=parseInt(data.tier,10)||1;
  [...document.querySelectorAll('.chips')].forEach(c=>{const b=[...c.querySelectorAll('button')];if(b.some(x=>/Minor/.test(x.textContent))){b.forEach(x=>x.classList.remove('on'));(b[tier-1]||b[1]).classList.add('on');}});
  document.querySelectorAll('.stepper .s').forEach(s=>s.classList.add('on'));
  const tcl=tier===1?['var(--emerald-soft)','var(--emerald)']:tier===2?['var(--amber-soft)','var(--amber)']:['var(--red-soft)','var(--red)'];
  const title=$('subTitle'); const card=title&&title.closest('.card');
  if(card){
   const old=$('voiceCapture'); if(old)old.remove();
   const b=document.createElement('div'); b.id='voiceCapture'; b.className='vcap';
   b.innerHTML=`<div class="vcap-h"><span class="vcap-ic"><i class="ti ti-microphone-2"></i></span><div><b>Captured by voice</b><div class="vcap-s">Review the details below and tap <b>Submit idea</b> — edit anything you like.</div></div></div>
     <div class="vcap-chips"><span class="vcap-pill" style="background:var(--ember-soft);color:var(--ember-d)"><i class="ti ti-building-factory-2"></i>${dept}</span><span class="vcap-pill" style="background:${tcl[0]};color:${tcl[1]}"><i class="ti ti-stack-2"></i>Tier ${tier}</span><span class="vcap-pill" style="background:var(--surface-2);color:var(--muted)"><i class="ti ti-coin"></i>${data.cost_estimate||''}</span></div>`;
   card.parentNode.insertBefore(b,card);
   b.scrollIntoView({behavior:'smooth',block:'center'});
  }
  if(window.dupCheck) try{dupCheck(data.title+' '+(data.description||''));}catch(e){}
 }

 /* ---------- public ---------- */
 async function open(){
  build(); ending=false; paused=false; emptyTries=0; history=[]; ideaText=''; clarifyText=''; askedDept=false;
  ov.classList.add('open'); showScreen('vLang');
  online=await probe();
  const m=$('vMode');
  if(m) m.innerHTML = online
    ? '<i class="ti ti-microphone"></i> Voice powered by Sarvam + Claude — pick a language and speak'
    : (hasSpeech() ? '<i class="ti ti-microphone"></i> Offline preview (no server) — browser voice; pick a language'
                   : '<i class="ti ti-keyboard"></i> No server &amp; no browser voice — you can type your idea');
  try{speechSynthesis.getVoices();}catch(e){}
 }
 async function pick(code){
  lang=code; ending=false; paused=false; emptyTries=0; history=[]; ideaText=''; clarifyText=''; askedDept=false;
  showScreen('vConvo'); const t=$('vType'); if(t)t.classList.remove('show'); hideErr(); setYou('');
  let micP=Promise.resolve();
  if(online&&!micStream){ micP=initMic().catch(()=>{ online=false; showErr(LANGS[lang].micErr); }); }
  await say(LANGS[lang].welcome(EMP_NAME())); // greet (text reveals in sync with the voice); mic initialises in parallel
  await micP;
  turn();
 }
 function again(){ if(ending)return; paused=false; emptyTries=0; turn(); }
 function sendTyped(){ const i=$('vTypeIn'); if(!i)return; const v=i.value.trim(); if(v.length<2)return; i.value=''; handleUser(v); }
 function close(){
  paused=true; ending=true;
  try{if(curRecog)curRecog.abort();}catch(e){}
  try{if(curRec&&curRec.state!=='inactive')curRec.stop();}catch(e){}
  if(vadRAF)cancelAnimationFrame(vadRAF);
  try{speechSynthesis.cancel();}catch(e){}
  if(ov)ov.classList.remove('open');
 }
 return {open,pick,again,sendTyped,close};
})();
