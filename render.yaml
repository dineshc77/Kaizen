services:
  # ── Existing Kaizen portal (Flask + gunicorn) ───────────────────────────────
  - type: web
    name: kaizen-voice
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # set this secret in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"

  # ── Kaizen MCP server (streamable-HTTP, for Claude Desktop remote connector) ─
  # Endpoint after deploy:  https://kaizen-mcp.onrender.com/mcp
  - type: web
    name: kaizen-mcp
    runtime: python
    plan: starter          # NOT free: a sleeping MCP endpoint stalls the demo
    buildCommand: pip install -r requirements-mcp.txt
    startCommand: python kaizen_mcp_server.py
    envVars:
      - key: TRANSPORT
        value: http        # run streamable-HTTP (not stdio)
      - key: MCP_AUTH_TOKEN
        sync: false        # set a long random secret in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"
