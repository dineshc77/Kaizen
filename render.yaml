services:
  - type: web
    name: kaizen-voice
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # set this secret in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"
