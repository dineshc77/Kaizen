<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Kaizen · CI Manager Console — Grasim Fibre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Sora:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --ink:#15171C;--ink-2:#2A2E37;--surface:#FFFFFF;--surface-2:#FAF9F5;--bg:#EFEDE6;
  --line:rgba(21,23,28,.10);--line-2:rgba(21,23,28,.16);--muted:#6E6D66;--muted-2:#9B9A92;
  --ember:#EF5026;--ember-d:#C23C18;--ember-soft:#FCEAE3;
  --emerald:#159468;--emerald-soft:#E2F2EB;--amber:#D98A12;--amber-soft:#FBEFD7;
  --blue:#2A6FE0;--blue-soft:#E5EEFC;--red:#D8423A;--red-soft:#FBE6E4;--violet:#5b4ad1;--violet-soft:#ECEAFE;--teal:#0f8a8a;
  --d-bg:#0E1116;--d-panel:#161B22;--d-panel-2:#1C232C;--d-line:rgba(255,255,255,.09);--d-text:#E9EAE4;--d-muted:#9098A2;
  --r:12px;--r-lg:16px;
  --sh:0 1px 2px rgba(21,23,28,.05),0 6px 22px rgba(21,23,28,.06);
  --sh-lg:0 2px 6px rgba(21,23,28,.06),0 24px 60px rgba(21,23,28,.13);
  --sans:"Hanken Grotesk",sans-serif;--disp:"Sora",sans-serif;--mono:"JetBrains Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.mono{font-family:var(--mono);font-feature-settings:"tnum"}
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}

/* sidebar */
.side{background:var(--d-bg);color:var(--d-muted);padding:18px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side .lg{display:flex;align-items:center;gap:10px;color:#fff;font-family:var(--disp);font-weight:700;font-size:15px;padding:4px 8px 4px}
.side .lg .mark{width:30px;height:30px;border-radius:8px;background:var(--ember);display:grid;place-items:center;font-size:15px;position:relative;overflow:hidden}
.side .lg small{display:block;font-family:var(--sans);font-weight:500;font-size:10px;color:var(--d-muted);margin-top:-1px}
.side .sec{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#5d646e;font-weight:700;margin:18px 10px 7px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;font-size:13px;font-weight:500;color:var(--d-muted);position:relative}
.nav a .ti{font-size:18px}
.nav a .cnt{margin-left:auto;font-family:var(--mono);font-size:10.5px;font-weight:600;background:var(--d-panel-2);padding:2px 7px;border-radius:99px}
.nav a.on{background:var(--d-panel-2);color:#fff}
.nav a.on::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--ember)}
.nav a:hover{color:#fff}
.side .who{margin-top:auto;display:flex;align-items:center;gap:10px;padding:11px 8px 2px;border-top:1px solid var(--d-line);font-size:12.5px}
.side .who b{color:#fff;font-weight:600;display:block}

/* main */
.main{display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;gap:14px;padding:15px 26px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.topbar h1{font-family:var(--disp);font-size:19px;font-weight:600;letter-spacing:-.02em}
.topbar .crumb{font-size:11px;color:var(--muted);font-weight:600}
.topbar .srch{margin-left:8px;flex:1;max-width:300px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:8px}
.topbar .srch input{border:none;background:none;outline:none;font:inherit;color:var(--ink);width:100%}
.seg{display:flex;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:3px}
.seg button{font-size:12px;font-weight:600;color:var(--muted);padding:6px 11px;border-radius:7px}
.seg button.on{background:var(--ink);color:#fff}
.view{padding:24px 26px 60px;overflow:auto}

/* bits */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:999px;line-height:1}
.pill .ti{font-size:13px}
.pill.ok{background:var(--emerald-soft);color:var(--emerald)}.pill.work{background:var(--blue-soft);color:var(--blue)}
.pill.warn{background:var(--amber-soft);color:var(--amber)}.pill.bad{background:var(--red-soft);color:var(--red)}
.pill.muted{background:rgba(21,23,28,.06);color:var(--muted)}.pill.ember{background:var(--ember-soft);color:var(--ember-d)}
.pill.violet{background:var(--violet-soft);color:var(--violet)}
.tag{font-size:10px;font-weight:600;padding:3px 7px;border-radius:6px;background:rgba(21,23,28,.05);color:var(--muted)}
.tier{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px}
.tier.A{background:var(--emerald-soft);color:var(--emerald)}.tier.B{background:var(--blue-soft);color:var(--blue)}.tier.C{background:var(--violet-soft);color:var(--violet)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:13px;padding:10px 16px;border-radius:10px;background:var(--surface);border:1px solid var(--line-2);transition:.15s}
.btn:hover{border-color:var(--ink-2)}
.btn.prim{background:var(--ember);color:#fff;border-color:var(--ember)}.btn.prim:hover{background:var(--ember-d)}
.btn.sm{padding:7px 12px;font-size:12px}
.btn.block{width:100%}
.avatar{border-radius:50%;flex:none;display:grid;place-items:center;font-weight:600;color:#fff;font-size:11px}
.bar{height:7px;border-radius:99px;background:rgba(21,23,28,.08);overflow:hidden}.bar>i{display:block;height:100%;border-radius:99px;background:var(--ember)}
hr.sep{border:none;border-top:1px solid var(--line);margin:14px 0}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh)}
.cardp{padding:18px}
.card h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.card .sub{font-size:11.5px;color:var(--muted);margin-top:2px}

/* kpi */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:13px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:15px;box-shadow:var(--sh);position:relative;overflow:hidden}
.kpi .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:16px;margin-bottom:10px}
.kpi .lab{font-size:11px;color:var(--muted);font-weight:600}
.kpi .val{font-family:var(--disp);font-size:25px;font-weight:600;letter-spacing:-.02em;margin-top:2px}
.kpi .val small{font-size:13px;color:var(--muted)}
.kpi .delta{font-size:11px;font-weight:600;color:var(--emerald);margin-top:3px;display:flex;align-items:center;gap:3px}

/* grids */
.g{display:grid;gap:16px}
.g>*,.kpis>*{min-width:0}
.g.c2{grid-template-columns:1fr 1fr}.g.c3{grid-template-columns:repeat(3,1fr)}
.g.wl{grid-template-columns:repeat(3,minmax(0,1fr))}
.g.wl>:first-child{grid-column:span 2}.g.wr{grid-template-columns:1fr 1.5fr}
.aqcard{display:flex;flex-direction:column}
.aqcard #aq{flex:0 0 auto}
.chartbox{position:relative;width:100%;height:240px}
.chartbox.tall{height:280px}
.chartbox.sm{height:200px}
.dash{display:flex;flex-direction:column;gap:16px}
.dash .kpis{margin-bottom:0}
.cardhead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.minisel{font-family:var(--sans);font-size:11.5px;font-weight:600;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line-2);border-radius:8px;padding:6px 26px 6px 10px;cursor:pointer;outline:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236E6D66' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 7px center;transition:.15s}
.minisel:hover{border-color:var(--ink-2)}

/* list rows */
.qitem{display:flex;align-items:center;gap:11px;padding:11px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;cursor:pointer;transition:.12s}
.qitem:hover{border-color:var(--line-2);background:var(--surface-2)}
.qitem .meta{flex:1;min-width:0}
.qitem .meta b{font-size:13px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qitem .meta span{font-size:11px;color:var(--muted)}
.contrib .cval{display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex:none}
.contrib .cval .v{font-family:var(--mono);font-weight:700;font-size:14.5px;letter-spacing:-.01em}
.contrib .cval .k{font-size:10px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:4px}
.contrib .cval .k .ti{font-size:12px}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr{cursor:pointer}
.tbl tbody tr:hover{background:var(--surface-2)}
.tbl .tt{font-weight:600}
.tbl td.exptog{width:30px;text-align:center;padding-right:0}
.tbl tr.piperow.on td.exptog i{color:var(--ember)}
.tbl tr.exprow{cursor:default}
.tbl tr.exprow:hover{background:transparent}
.tbl tr.exprow>td{padding:0 12px 16px;background:var(--ember-soft);border-bottom:1px solid var(--line)}
.pipe-detail{animation:expand .18s ease}
@keyframes expand{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.muted{color:var(--muted)}

/* implementation board */
.implayout{display:grid;grid-template-columns:290px 1fr;gap:16px;align-items:start}
.prail{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:10px;position:sticky;top:84px;max-height:calc(100vh - 110px);overflow:auto}
.prail-h{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--ink);padding:6px 8px 10px}
.prail-h .ti{font-size:16px;color:var(--muted)}
.prail-h .ct{margin-left:auto;font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);padding:2px 7px;border-radius:99px}
.prow{border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:8px;cursor:pointer;transition:.13s;position:relative}
.prow:hover{border-color:var(--line-2);background:var(--surface-2)}
.prow.on{border-color:var(--ember);background:var(--ember-soft)}
.prow.on::before{content:"";position:absolute;left:0;top:11px;bottom:11px;width:3px;border-radius:0 3px 3px 0;background:var(--ember)}
.pr-top{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.pr-title{font-size:12.5px;font-weight:600;line-height:1.3;margin-bottom:7px}
.pr-meta{display:flex;align-items:center;justify-content:space-between;font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:8px}
.pr-meta span{display:flex;align-items:center;gap:4px}.pr-meta .ti{font-size:12px}
.pr-bar{height:5px;border-radius:99px;background:rgba(21,23,28,.08);overflow:hidden}
.pr-bar>i{display:block;height:100%;border-radius:99px;background:var(--ember)}
.pr-pct{font-size:10px;font-weight:600;color:var(--muted);margin-top:5px;font-family:var(--mono)}

.impboard{min-width:0}
.impsum{margin-bottom:16px;padding:16px 18px}
.impsum-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.impsum-head b{font-size:15px;font-weight:600}
.idsel{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--ink);background:var(--surface-2);border:1px solid var(--line-2);border-radius:10px;padding:9px 38px 9px 13px;cursor:pointer;outline:none;appearance:none;max-width:520px;text-overflow:ellipsis;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%23EF5026' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 11px center;transition:.15s}
.idsel:hover{border-color:var(--ember)}
.idsel:focus{border-color:var(--ember);box-shadow:0 0 0 3px var(--ember-soft)}
.impsum-stats{display:flex;gap:26px;margin:16px 0 12px;flex-wrap:wrap}
.ist .il{font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.ist .iv{font-family:var(--disp);font-size:18px;font-weight:600;margin-top:3px;display:flex;align-items:center;gap:6px}
.ist .iv small{font-family:var(--sans);font-size:11px;font-weight:500;color:var(--muted)}
.ist .iv.ow{font-family:var(--sans);font-size:12.5px;font-weight:600}
.impbar{height:7px;border-radius:99px;background:rgba(21,23,28,.08);overflow:hidden}
.impbar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--ember),var(--amber))}

/* kanban */
.kanban{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
.kcol{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r);padding:10px;min-height:360px}
.kcol .h{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:10px;padding:2px 4px}
.kcol .h .hl{display:flex;align-items:center;gap:7px}
.kcol .h .dot{width:7px;height:7px;border-radius:50%}
.kcol .h .ct{font-family:var(--mono);font-size:11px;color:var(--muted)}
.kempty{font-size:11px;color:var(--muted-2);text-align:center;padding:24px 0;border:1px dashed var(--line-2);border-radius:9px}
.kcard{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:9px;box-shadow:var(--sh)}
.kcard.blocked{border-color:rgba(216,66,58,.4);background:var(--red-soft)}
.kcard.is-done{opacity:.62}
.kcard.is-done .kt{text-decoration:line-through;color:var(--muted)}
.ktop{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.phase{font-size:9.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:3px 7px;border-radius:6px}
.kcard .kt{font-size:12px;font-weight:600;line-height:1.3;margin-bottom:9px}
.kreason{font-size:10.5px;color:var(--red);font-weight:600;display:flex;align-items:flex-start;gap:5px;margin:-3px 0 9px}
.kreason .ti{font-size:13px;flex:none;margin-top:1px}
.kcard .kf{display:flex;align-items:center;justify-content:space-between}
.kcard .due{font-size:10px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:4px}
.kcard .due.over{color:var(--red)}
.kcol{display:flex;flex-direction:column}
.kbody{flex:1}
.kcol.kdrop{border-color:var(--ember);background:var(--ember-soft);box-shadow:inset 0 0 0 1.5px var(--ember)}
.ct.wipover{color:var(--red);font-weight:700}
.kcard[draggable]{cursor:grab}
.kcard[draggable]:active{cursor:grabbing}
.ktop{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:8px}
.kt-actions{display:flex;align-items:center;gap:3px}
.kgrip{color:var(--muted-2);font-size:14px;cursor:grab}
.ktx{border:none;background:transparent;color:var(--muted-2);cursor:pointer;padding:1px;border-radius:5px;display:flex}
.ktx:hover{color:var(--red);background:var(--red-soft)}
.kcard .kf{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.kassign{display:flex;align-items:center;gap:5px;min-width:0}
.ksel{font-family:var(--sans);font-size:10.5px;font-weight:600;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:3px 5px;cursor:pointer;outline:none;max-width:104px;text-overflow:ellipsis}
.ksel:hover{border-color:var(--ink-2)}
.ksel.xs{max-width:78px}
.ksel.over{color:var(--red);border-color:rgba(216,66,58,.4)}
.kreason-i{width:100%;font-family:var(--sans);font-size:11px;color:var(--red);background:var(--surface);border:1px solid rgba(216,66,58,.35);border-radius:7px;padding:5px 7px;margin-bottom:8px;outline:none;box-sizing:border-box}
.kreason-i:focus{border-color:var(--red)}
.kadd{width:100%;margin-top:4px;border:1px dashed var(--line-2);background:transparent;color:var(--muted);border-radius:9px;padding:8px;font-size:11.5px;font-weight:600;font-family:var(--sans);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.13s}
.kadd:hover{border-color:var(--ember);color:var(--ember);background:var(--surface)}
.kaddform{background:var(--surface);border:1px solid var(--ember);border-radius:10px;padding:9px;margin-bottom:9px;box-shadow:var(--sh)}
.kfi{width:100%;font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink);border:1px solid var(--line-2);border-radius:7px;padding:6px 8px;outline:none;box-sizing:border-box;background:var(--surface-2)}
.kfi:focus{border-color:var(--ember)}
.kfi.sm{font-size:11px;padding:5px 6px;font-weight:600}
.kfrow{display:flex;gap:6px;margin:6px 0}
.kfrow .kfi{flex:1;min-width:0}
.kfa{display:flex;justify-content:flex-end;gap:6px;margin-top:8px}
.pill.sm{font-size:9.5px;padding:3px 6px}

/* intake review */
.intake-wrap{display:flex;flex-direction:column;gap:16px}
.ireview{display:flex;flex-direction:column;gap:16px;min-width:0}
.intake-top{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh);padding:14px 16px}
.awhead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.aw-h-l{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.aw-h-l .ti{color:var(--ember);font-size:17px}
.aw-stats{display:flex;gap:8px;flex-wrap:wrap}
.awstat{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);border-radius:99px;padding:5px 11px}
.awstat b{font-family:var(--disp);font-size:13px;font-weight:700;color:var(--ink)}
.awstat.tiermix .tier{margin:0 1px}
.aw-row{display:flex;gap:11px;overflow-x:auto;padding-bottom:3px}
.awcard{flex:0 0 224px;text-align:left;background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:12px;cursor:pointer;transition:.13s;font-family:inherit;display:flex;flex-direction:column;gap:7px}
.awcard:hover{border-color:var(--line-2);transform:translateY(-1px)}
.awcard.on{border-color:var(--ember);background:var(--ember-soft);box-shadow:0 0 0 2px var(--ember-soft)}
.aw-top{display:flex;align-items:center;justify-content:space-between}
.aw-title{font-size:12.5px;font-weight:600;line-height:1.32;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:33px}
.aw-sub{font-size:11px;color:var(--muted)}
.aw-foot{display:flex;align-items:center;justify-content:space-between;font-size:10.5px;font-weight:600;color:var(--muted);border-top:1px solid var(--line);padding-top:8px;margin-top:auto}
.aw-foot .ti{font-size:12px}
.aw-est{display:flex;align-items:center;gap:4px;color:var(--ink-2)}
.aw-trk{display:flex;align-items:center;gap:4px}
.ihead{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ihead b{font-size:15px;font-weight:600}
.sec-h{font-size:11px;font-weight:700;color:var(--muted-2);letter-spacing:.05em;margin-bottom:10px}

VIEWS.pipeline=function(){

function selKan(id){SEL.kanban=id;VIEWS.kanban();}

/* standard implementation phases for a Kaizen project (logical order) */
const IMPL_FLOW=[
 ['Feasibility & baseline study','Design','Priya Iyer'],
 ['Detailed engineering & control logic','Design','Deepak Kulkarni'],
 ['Procure equipment & spares','Procure','Rakesh Nair'],
 ['Vendor PO approval','Procure','Vikram Saxena'],
 ['Mounting & cabling','Install','Anita Mehta'],
 ['Setpoint & software configuration','Install','Manish Gupta'],
 ['Trial run & data validation','Commission','Neha Shah'],
 ['Safety & quality sign-off','Commission','Sunita Patil'],
 ['SOP update & operator training','Rollout','Imran Sheikh'],
 ['30-day ROI verification','Verify','Arjun Rao']];
const PHASECLR={Design:'#5b4ad1',Procure:'#D98A12',Install:'#2A6FE0',Commission:'#0f8a8a',Rollout:'#159468',Verify:'#EF5026'};
const KMONTH=Array.from({length:10},(_,i)=>{const dt=new Date(Date.now()+(i*2+1)*864e5);return dt.getDate()+' '+dt.toLocaleString('en',{month:'short'});});
const KCOLS=[['todo','To do','#9B9A92'],['inprogress','In progress','#2A6FE0'],['blocked','Blocked','#D8423A'],['review','Review','#D98A12'],['done','Done','#159468']];
const KWIP={inprogress:3};
const KTODAY=new Date().getDate();

/* deterministic seed so each project starts with a distinct, sensible state */
function boardFor(s){
 const N=IMPL_FLOW.length;
 let done=Math.round(2+((s.score-66)/20)*4);done=Math.max(2,Math.min(7,done));
 const blocked=(s.sla==='warn'||s.sla==='breach');
 const cols={todo:[],inprogress:[],blocked:[],review:[],done:[]};
 const kp=kpeople();
 IMPL_FLOW.forEach(([t,ph,who],i)=>{
  const card={t,ph,who:REVIEWER_POOL.length?kp[(i+parseInt((s.id||'').slice(-2))||0)%kp.length]:who,due:KMONTH[i]};
  let col;
  if(i<done)col='done';
  else if(i===done)col='inprogress';
  else if(i===done+1)col=blocked?'blocked':'inprogress';
  else if(i===done+2)col='review';
  else col='todo';
  if(col==='blocked')card.reason=s.cat==='ML/Digital'?'Awaiting model validation data':'Awaiting vendor quote';
  cols[col].push(card);
 });
 return {cols};
}
/* editable, persistent per-idea board state */
const KAN_STATE={};let TASK_SEQ=1,KDRAG=null;
const KAN_FETCHED={};const KAN_TARGET={};
function kanDate(iso){if(!iso)return '';const d=new Date(iso);return d.getDate()+' '+d.toLocaleString('en',{month:'short'});}
function kanFetch(id){ /* load this idea's real task board from implementation_tasks */
 if(KAN_FETCHED[id])return;KAN_FETCHED[id]=1;
 fetch(API_BASE+'/api/idea/'+encodeURIComponent(id)).then(r=>r.ok?r.json():null).then(dt=>{
  if(!dt||!dt.tasks||!dt.tasks.length)return;
  const cols={todo:[],inprogress:[],blocked:[],review:[],done:[]};
  let mx='';dt.tasks.forEach(t=>{if(t.due_date>mx)mx=t.due_date;(cols[t.status]||cols.todo).push({id:'T'+(TASK_SEQ++),t:t.title,ph:t.phase,who:t.assignee||'—',due:kanDate(t.due_date),reason:t.blocked_reason||''});});
  if(mx)KAN_TARGET[id]=mx;
  KAN_STATE[id]={cols,adding:null};
  if(cur==='kanban'&&SEL.kanban===id)VIEWS.kanban();
 }).catch(()=>{});
}
function kanState(id){
 kanFetch(id);
 if(!KAN_STATE[id]){
  const b=boardFor(IDEAS.find(d=>d.id===id));
  const cols={todo:[],inprogress:[],blocked:[],review:[],done:[]};
  Object.keys(b.cols).forEach(k=>b.cols[k].forEach(c=>cols[k].push({id:'T'+(TASK_SEQ++),t:c.t,ph:c.ph,who:c.who,due:c.due,reason:c.reason||''})));
  KAN_STATE[id]={cols,adding:null};
 }
 return KAN_STATE[id];
}
function kanFind(st,tid){for(const k in st.cols){const t=st.cols[k].find(x=>x.id===tid);if(t)return t;}return null;}
function kanAssign(id,tid,v){const t=kanFind(kanState(id),tid);if(t)t.who=v;VIEWS.kanban();}
function kanDue(id,tid,v){const t=kanFind(kanState(id),tid);if(t)t.due=v;VIEWS.kanban();}
function kanReason(id,tid,v){const t=kanFind(kanState(id),tid);if(t)t.reason=v;}
function kanDel(id,tid){const st=kanState(id);for(const k in st.cols){const i=st.cols[k].findIndex(x=>x.id===tid);if(i>=0){st.cols[k].splice(i,1);break;}}VIEWS.kanban();}
function kanDragStart(e,tid,from){KDRAG={tid,from};e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',tid)}catch(_){}}
function kanDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('kdrop');}
function kanDragLeave(e){e.currentTarget.classList.remove('kdrop');}
function kanDrop(e,to){e.preventDefault();e.currentTarget.classList.remove('kdrop');if(!KDRAG)return;const{tid,from}=KDRAG;KDRAG=null;if(from===to)return;const st=kanState(SEL.kanban);const i=st.cols[from].findIndex(x=>x.id===tid);if(i<0)return;const[t]=st.cols[from].splice(i,1);if(to==='blocked'){if(!t.reason)t.reason='Reason pending — add detail';}else{t.reason='';}st.cols[to].push(t);VIEWS.kanban();}
function kanAddOpen(id,col){kanState(id).adding=col;VIEWS.kanban();setTimeout(()=>{const el=document.getElementById('ktTitle');if(el)el.focus();},0);}
function kanAddCancel(id){kanState(id).adding=null;VIEWS.kanban();}
function kanAddSubmit(id,col){const ti=(document.getElementById('ktTitle')||{}).value||'';if(!ti.trim()){toast('Task title is required');return;}const who=(document.getElementById('ktWho')||{}).value,ph=(document.getElementById('ktPhase')||{}).value,due=(document.getElementById('ktDue')||{}).value;const st=kanState(id);st.cols[col].push({id:'T'+(TASK_SEQ++),t:ti.trim(),ph,who,due,reason:col==='blocked'?'Reason pending — add detail':''});st.adding=null;VIEWS.kanban();toast('Task added');}
function kanExport(id){const st=kanState(id),s=IDEAS.find(d=>d.id===id);const rows=[['Column','Phase','Task','Assignee','Due','Blocker reason']];KCOLS.forEach(([k,lab])=>st.cols[k].forEach(t=>rows.push([lab,t.ph,t.t,t.who,t.due,t.reason||''])));const csv=rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(',')).join('\n');try{const blob=new Blob([csv],{type:'text/csv'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=s.id+'_board.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);}catch(e){}toast('Board exported as CSV');}

VIEWS.kanban=function(){
 const list=IDEAS.filter(d=>d.stage==='implementation');
 if(!list.find(d=>d.id===SEL.kanban))SEL.kanban=list[0].id;
 const s=IDEAS.find(d=>d.id===SEL.kanban),st=kanState(s.id),cols=st.cols;
 const total=Object.values(cols).reduce((a,c)=>a+c.length,0),done=cols.done.length,pct=total?Math.round(done/total*100):0,blockedN=cols.blocked.length;

    <div class="kf"><span class="kassign">${av(t.who,20)}<select class="ksel" onchange="kanAssign('${s.id}','${t.id}',this.value)">${kpeople().map(p=>`<option ${p===t.who?'selected':''}>${p}</option>`).join('')}</select></span><select class="ksel xs ${ov?'over':''}" title="Due date" onchange="kanDue('${s.id}','${t.id}',this.value)">${KMONTH.map(d=>`<option ${d===t.due?'selected':''}>${d}</option>`).join('')}</select></div>
   </div>`;};
 const addForm=col=>`<div class="kaddform">
   <input id="ktTitle" class="kfi" placeholder="Task title" autofocus>

   <select id="ktWho" class="kfi sm" style="margin-top:6px">${kpeople().map(p=>`<option>${p}</option>`).join('')}</select>
   <div class="kfa"><button class="btn sm" onclick="kanAddCancel('${s.id}')">Cancel</button><button class="btn prim sm" onclick="kanAddSubmit('${s.id}','${col}')"><i class="ti ti-plus"></i>Add</button></div>
  </div>`;
 const column=(key,label,dot)=>{const cards=cols[key],wip=KWIP[key],over=wip&&cards.length>wip,ct=wip?`${cards.length} / ${wip}`:String(cards.length),adding=st.adding===key;
  return `<div class="kcol" ondragover="kanDragOver(event)" ondragleave="kanDragLeave(event)" ondrop="kanDrop(event,'${key}')">
    <div class="h"><span class="hl"><span class="dot" style="background:${dot}"></span>${label}</span><span class="ct ${over?'wipover':''}" ${over?'title="WIP limit exceeded"':''}>${ct}</span></div>
    <div class="kbody">${cards.map(t=>renderCard(t,key)).join('')}${!cards.length&&!adding?'<div class="kempty">No tasks</div>':''}${adding?addForm(key):''}</div>
    ${adding?'':`<button class="kadd" onclick="kanAddOpen('${s.id}','${key}')"><i class="ti ti-plus"></i>Add task</button>`}
   </div>`;};
 const opts=list.slice(0,100).map(d=>`<option value="${d.id}" ${d.id===s.id?'selected':''}>${d.id} · ${d.title}</option>`).join('');
 document.getElementById('view').innerHTML=`
  <div class="card cardp impsum">
   <div class="impsum-head">
    <select class="idsel" onchange="selKan(this.value)">${opts}</select>

    <span class="pill ${blockedN?'bad':'ok'}" style="margin-left:auto"><i class="ti ${blockedN?'ti-alert-triangle':'ti-flag'}"></i>${blockedN?blockedN+' task'+(blockedN>1?'s':'')+' blocked':'On schedule'}</span>
   </div>
   <div class="impsum-stats">
    <div class="ist"><div class="il">Progress</div><div class="iv">${pct}%</div></div>

    <div class="ist"><div class="il">Target</div><div class="iv">${target}</div></div>
    <div class="ist"><div class="il">Est. savings</div><div class="iv">${fmtL(s.est)}<small>/yr</small></div></div>
   </div>

};

function rewMeta(d){

 return {likes,comments,endorse,eng:endorse*4+comments*10,safety:d.cat==='Safety',sustain:['Environment','Energy'].includes(d.cat),replicable:['Energy','Maintenance','Quality'].includes(d.cat)};}

function rewAspect(d,a){const m=rewMeta(d);return {score:d.score,roi:(d.act||0),eng:m.eng,collab:(d.collab||0),variance:(d.act&&d.est?((d.act-d.est)/d.est*100):0),safety:m.safety,sustain:m.sustain,replicable:m.replicable}[a];}

 </div>`;}

function leadForTrack(key){const g=trackGroup(key);if(g)return g.lead;const p=kpeople();const h=[...key].reduce((a,c)=>a+c.charCodeAt(0),0);return p[h%p.length];}

 const hdot=h=>`<span class="hdot" style="background:var(--${h[0]==='ok'?'emerald':h[0]==='warn'?'amber':'red'})" title="${h[1]}"></span>`;
 const litem=gg=>{const i=GROUPS.indexOf(gg),p=GPHASE[gg.phase],h=gHealth(gg);return `<div class="qitem" onclick="gsel(${i})" style="${i===GSEL?'border-color:var(--ember);background:var(--ember-soft)':''}"><span class="pill ${p[0]}"><i class="ti ${p[1]}"></i></span><div class="meta"><b>${gg.name}</b><span>Lead ${_fn(gg.lead)} · ${gg.members.length} member${gg.members.length>1?'s':''} · ${gLoad(gg)} active</span></div>${hdot(h)}<i class="ti ti-chevron-right muted"></i></div>`;};
 const sect=(t,arr)=>arr.length?`<div style="font-size:10.5px;font-weight:700;letter-spacing:.1em;color:var(--muted-2);margin:14px 4px 8px">${t}</div>${arr.map(litem).join('')}`:'';
 const members=g.members.map(m=>{const isLead=m===g.lead,mi=(g.minfo&&g.minfo[m])||{};const homeTrack=tkeys.find(tk=>TRACKS[tk].lead===m),home=mi.dept||(homeTrack?TRACKS[homeTrack].domain:((IDEAS.find(d=>d.sub===m)||{}).dept||'Reviewer')),active=mi.n!=null?mi.n:(m.length+g.depts.length)%4,ta=mi.role||((1+m.length%3)+'.'+(m.charCodeAt(1)%9)+'d');
   return `<tr style="cursor:default"><td><div style="display:flex;align-items:center;gap:9px"><div class="avatar" style="width:30px;height:30px;background:${_sc(m)[1]}">${_sc(m)[0]}</div><div><b>${m}</b><br><span class="muted" style="font-size:11px">${home}</span></div></div></td><td>${isLead?'<span class="pill ember sm"><i class="ti ti-star"></i>Lead</span>':`<button class="btn sm" onclick="gSetLead(${GSEL},'${m}')"><i class="ti ti-star"></i>Make lead</button>`}</td><td><span class="pill ${active?'work':'muted'} sm">${active} reviews</span></td><td class="muted" style="text-transform:capitalize">${ta}</td><td style="text-align:right">${g.members.length>1?`<button class="btn sm" onclick="gRemoveMember(${GSEL},'${m}')" title="Remove"><i class="ti ti-user-minus"></i></button>`:'<span class="muted" style="font-size:11px">last member</span>'}</td></tr>`;}).join('');
 const avail=kpeople().filter(n=>!g.members.includes(n)).slice(0,30);
 const trackChip=g.track?`<span class="tag" style="background:${TRACKS[g.track].clr}1a;color:${TRACKS[g.track].clr};border-color:${TRACKS[g.track].clr}55">${TRACKS[g.track].name} · ${TRACKS[g.track].domain}</span>`:'<span class="tag">Decision / approval node</span>';
 const detail=`<div class="card cardp"><div style="display:flex;align-items:center;gap:11px;flex-wrap:wrap"><span class="pill ${pm[0]}"><i class="ti ${pm[1]}"></i>${pm[2]}</span><h3 style="font-size:16px;margin:0">${g.name}</h3><span style="margin-left:auto" class="pill ${hh[0]}"><i class="ti ${hh[0]==='ok'?'ti-circle-check':hh[0]==='warn'?'ti-alert-triangle':'ti-x'}"></i>${hh[1]}</span></div>
   ${g.note?`<div style="margin-top:10px;font-size:12.5px;color:var(--muted)"><i class="ti ti-info-circle"></i> ${g.note}</div>`:''}
   <div class="g c2" style="margin-top:14px;gap:14px"><div><div style="font-size:10.5px;font-weight:700;color:var(--muted-2);letter-spacing:.05em;margin-bottom:7px">SERVES WORKFLOW TRACK</div><div class="chips" style="display:flex;flex-wrap:wrap;gap:6px">${trackChip}</div></div>
    <div><div style="font-size:10.5px;font-weight:700;color:var(--muted-2);letter-spacing:.05em;margin-bottom:7px">USED IN TIERS</div><div style="display:flex;gap:6px">${g.tiers.map(t=>`<span class="tier ${t}">Tier ${t}</span>`).join('')}</div></div></div>
   <div style="display:flex;gap:10px;margin-top:14px">
    <div style="flex:1;background:var(--surface-2);border-radius:11px;padding:11px;text-align:center"><div class="mono" style="font-weight:700;font-size:18px">${g.members.length}</div><div class="muted" style="font-size:10px;font-weight:600">REVIEWERS</div></div>
    <div style="flex:1;background:var(--surface-2);border-radius:11px;padding:11px;text-align:center"><div class="mono" style="font-weight:700;font-size:18px;color:var(--ember)">${gLoad(g)}</div><div class="muted" style="font-size:10px;font-weight:600">ACTIVE IDEAS</div></div>
    <div style="flex:1;background:var(--surface-2);border-radius:11px;padding:11px;text-align:center"><div style="display:flex;align-items:center;justify-content:center;gap:5px"><span class="mono" style="font-weight:700;font-size:18px">SLA</span><select class="tsel" onchange="gSetSLA(${GSEL},this.value)">${[1,2,3,5].map(dd=>`<option ${g.sla===dd?'selected':''} value="${dd}">${dd}d</option>`).join('')}</select></div><div class="muted" style="font-size:10px;font-weight:600">TURNAROUND TARGET</div></div></div>
   <hr class="sep"/>
   <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><h3 style="margin:0"><i class="ti ti-users"></i>Reviewers</h3></div>
   <table class="tbl"><thead><tr><th>Member</th><th>Lead</th><th>Reviews done</th><th>Role</th><th></th></tr></thead><tbody>${members}</tbody></table>
   <div class="addtrk" style="margin-top:12px;padding-top:12px"><span class="muted" style="font-size:12px;display:flex;align-items:center;gap:5px"><i class="ti ti-user-plus"></i>Add a reviewer to this group</span><select class="minisel" ${avail.length?'':'disabled'} onchange="gAddMember(${GSEL},this.value)"><option value="">${avail.length?'Select a person…':'Everyone added'}</option>${avail.map(n=>`<option>${n}</option>`).join('')}</select></div>
   <div style="margin-top:16px"><div style="font-size:10.5px;font-weight:700;color:var(--muted-2);letter-spacing:.05em;margin-bottom:8px">WORKLOAD · IDEAS REVIEWED</div><div class="chartbox sm"><canvas id="gWork"></canvas></div></div>
  </div>`;
 const covRow=key=>{const gg=trackGroup(key),t=TRACKS[key],h=gg?gHealth(gg):['bad','Uncovered'];return `<div class="covrow" style="border-left:3px solid ${t.clr}" ${gg?`onclick="gsel(${GROUPS.indexOf(gg)})"`:''}><div class="cov-t"><b>${t.name}</b><span class="muted">${gg?'→ '+gg.name+' · lead '+_fn(gg.lead):'No group assigned'}</span></div><span class="covm">${gg?gg.members.length:0} rev</span><span class="pill ${h[0]} sm"><i class="ti ${h[0]==='ok'?'ti-check':h[0]==='warn'?'ti-alert-triangle':'ti-x'}"></i>${h[1]}</span></div>`;};
 document.getElementById('view').innerHTML=`
  <div class="kpis" style="grid-template-columns:repeat(4,1fr)">${k('ti-checklist','#2A6FE0','Reviewer groups',GROUPS.filter(x=>x.phase==='eval'||x.phase==='both').length)}${k('ti-gavel','#D98A12','Approval authorities',GROUPS.filter(x=>x.phase==='decision').length)}${k('ti-users','#159468','Active reviewers',reviewers.length)}${k('ti-shield-check',covered<tkeys.length?'#D8423A':'#159468','Tracks staffed',covered+'/'+tkeys.length)}</div>
  <div class="g wr" style="align-items:start"><div class="card cardp"><h3><i class="ti ti-folders"></i>All groups</h3>${sect('EVALUATION',GROUPS.filter(x=>x.phase==='eval'))}${sect('EVAL + APPROVAL',GROUPS.filter(x=>x.phase==='both'))}${sect('APPROVAL',GROUPS.filter(x=>x.phase==='appr'))}${sect('DECISION AUTHORITY',GROUPS.filter(x=>x.phase==='decision'))}</div>${detail}</div>`;
 mk('gWork',{type:'bar',data:{labels:g.members.map(m=>_sc(m)[0]),datasets:[{data:g.members.map(m=>(g.minfo&&g.minfo[m]&&g.minfo[m].n!=null)?g.minfo[m].n:9+m.charCodeAt(0)%15),backgroundColor:g.members.map(m=>m===g.lead?'#EF5026':_sc(m)[1]),borderRadius:6,barThickness:34}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:GRID,ticks:{precision:0}},x:noGrid}}});
};
renderNav();
document.getElementById('view').innerHTML='<div style="display:grid;place-items:center;height:55vh;color:var(--muted);font-size:13.5px;font-weight:600">Loading live data from kaizen.db…</div>';

/* ===================== LIVE DATA (kaizen.db via the Flask backend) =====================
   Renders the built-in demo data instantly, then replaces IDEAS with ALL ideas from the
   database (compact rows, gzipped ~380 KB) so every chart, KPI, funnel and table on this
   console aggregates the real 20k-idea dataset client-side. Read-only. */
function mapRow(r){const[id,title,dept,cat,tier,stage,est,act,score,sla,month,sub,plant,endo,cm,collab]=r;const sc=_sc(sub);
 return {id,title,dept,cat,tier,stage,est,act,score,sla,month:month||'-',sub,plant,init:sc[0],clr:sc[1],endo,cm:cm||0,collab:collab||0};}
async function loadLive(){
 try{
  const j=async u=>{const r=await fetch(API_BASE+u);if(!r.ok)throw new Error(u+' '+r.status);return r.json();};
  const [all,boot]=await Promise.all([j('/api/portal/all-ideas'),j('/api/portal/bootstrap?plant=All')]);
  IDEAS.length=0;all.ideas.forEach(r=>IDEAS.push(mapRow(r)));
  PLANTS_CYCLE.length=0;boot.plants.forEach(p=>PLANTS_CYCLE.push(p));
  CYCLE=boot.cycle_times||null;CONTRIB_LIVE=boot.contributors||null;
  const mgr=boot.personas&&boot.personas.ci_manager;
  if(mgr){const sc=_sc(mgr.name);const w=document.getElementById('whoBox');
   if(w)w.innerHTML=`<div class="avatar" style="width:32px;height:32px;background:${sc[1]}">${sc[0]}</div><div><b>${mgr.name}</b>CI Manager · ${mgr.plant}</div>`;}
  PUBLISHED.clear();
  IDEAS.filter(d=>d.stage==='done'&&d.act!=null).sort((a,b)=>b.act-a.act).slice(0,4).forEach(d=>PUBLISHED.add(d.id));
  if(boot.workflow_tracks&&boot.workflow_tracks.length){ /* designed review tracks from workflow_tracks */
   Object.keys(TRACKS).forEach(k=>delete TRACKS[k]);
   boot.workflow_tracks.forEach(t=>{TRACKS[t.key]={name:t.name,domain:t.domain,phase:t.phase==='appr'?'appr':'eval',clr:t.color,always:!!t.always_present,sla:t.default_sla_days};});
  }
  try{ /* award engine config from award_definitions + award_highlight_rules */
   const ac=await j('/api/award-config');
   if(ac.rules&&ac.rules.length){
    REWARD_RULES.length=0;
    ac.rules.forEach(r=>REWARD_RULES.push({id:r.id,on:true,icon:r.icon,clr:r.color,label:r.label,desc:r.description,unit:r.unit||'',th:r.threshold,
     test:(d,m,rr)=>r.op==='is'?!!rewAspect(d,r.aspect):(rewAspect(d,r.aspect)||0)>=rr.th,
     why:(d,m)=>{const v=rewAspect(d,r.aspect);return r.op==='is'?r.description:(r.aspect==='roi'?fmtL(v)+' realized':Math.round(v)+(r.unit?' '+r.unit:''));}}));
   }
   if(ac.definitions&&ac.definitions.length){
    REWARD_CATALOG.length=0;
    ac.definitions.forEach(a=>REWARD_CATALOG.push({id:a.id,on:true,name:a.name,short:a.short,kind:a.kind,icon:a.icon,clr:a.color,desc:a.description,join:a.join_mode,
     conds:a.conds.map(c=>({a:c.a,op:c.op==='is'?'is':'gte',th:c.th}))}));
   }
  }catch(e){console.warn('award config load failed',e);}
  try{ /* intake classification metadata for the visible cards */
   const im=await j('/api/intake-meta?limit=40');
   (im.meta||[]).forEach(x=>{INTAKE_META[x.id]=metaFromCls(x.classifications,x.desc,x.photos,x.total);INTAKE_FETCHED[x.id]=1;});
  }catch(e){console.warn('intake meta load failed',e);}
  try{ /* real evaluator & approver groups */
   const gj=await j('/api/groups');
   if(gj.groups&&gj.groups.length){
    GROUPS.length=0;
    gj.groups.forEach(g=>{const mem=g.members.map(m=>m.name);
     const minfo={};g.members.forEach(m=>{minfo[m.name]={dept:m.dept,n:m.n_reviews,role:m.role};});
     GROUPS.push({key:'g'+g.id,track:null,name:g.name,phase:g.purpose==='approval'?'appr':'eval',
      lead:mem[0]||'—',members:mem,minfo,depts:[g.department||g.plant],tiers:['A','B','C'],sla:2,
      note:(g.purpose==='approval'?'Approval board':'Evaluation panel')+' · '+g.plant});});
    GSEL=0;
    REVIEWER_POOL.length=0;
    [...new Set(gj.groups.flatMap(g=>g.members.map(m=>m.name)))].forEach(n=>REVIEWER_POOL.push(n));
   }
  }catch(e){console.warn('groups load failed',e);}
  renderNav();clearCharts();go(cur);
  console.log('Kaizen console: live data loaded —',IDEAS.length,'ideas ·',PLANTS_CYCLE.length,'plants');
 }catch(e){console.warn('Kaizen console: backend unreachable — showing built-in demo data.',e);renderNav();clearCharts();go(cur);}
}
loadLive();

</script>
